<svg width="900" height="220" viewBox="0 0 900 220" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffd6ec">
        <animate attributeName="stop-color" values="#ffd6ec;#ffc1e3;#ffd6ec" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="50%" stop-color="#ff9ecb">
        <animate attributeName="stop-color" values="#ff9ecb;#ff8ec2;#ff9ecb" dur="6s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#ff6fae">
        <animate attributeName="stop-color" values="#ff6fae;#ff5fa3;#ff6fae" dur="6s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <radialGradient id="flame" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#fff6c9"/>
      <stop offset="55%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff8b3d"/>
    </radialGradient>
  </defs>

  <!-- background -->
  <rect width="900" height="220" rx="28" fill="url(#bgGrad)"/>

  <!-- soft glow circles -->
  <circle cx="120" cy="40" r="70" fill="#ffffff" opacity="0.08"/>
  <circle cx="800" cy="180" r="90" fill="#ffffff" opacity="0.08"/>

  <!-- sparkles -->
  <g fill="#ffffff">
    <path d="M70,30 l3,9 l9,3 l-9,3 l-3,9 l-3,-9 l-9,-3 l9,-3 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0s" repeatCount="indefinite"/>
    </path>
    <path d="M830,40 l2.5,7 l7,2.5 l-7,2.5 l-2.5,7 l-2.5,-7 l-7,-2.5 l7,-2.5 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.4s" begin="0.6s" repeatCount="indefinite"/>
    </path>
    <path d="M150,170 l2,6 l6,2 l-6,2 l-2,6 l-2,-6 l-6,-2 l6,-2 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1.9s" begin="1.1s" repeatCount="indefinite"/>
    </path>
    <path d="M760,150 l3,8 l8,3 l-8,3 l-3,8 l-3,-8 l-8,-3 l8,-3 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.1s" begin="0.3s" repeatCount="indefinite"/>
    </path>
    <path d="M450,25 l2,6 l6,2 l-6,2 l-2,6 l-2,-6 l-6,-2 l6,-2 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="1.7s" begin="0.9s" repeatCount="indefinite"/>
    </path>
    <path d="M40,120 l2,6 l6,2 l-6,2 l-2,6 l-2,-6 l-6,-2 l6,-2 Z" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2s" begin="1.5s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- floating hearts (using classic heart icon path, scaled) -->
  <g fill="#ffffff" opacity="0.85">
    <g transform="translate(60,210) scale(1.1)">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      <animateTransform attributeName="transform" type="translate" values="60,210; 60,-30" dur="7s" begin="0s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="7s" begin="0s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(220,220) scale(0.8)">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      <animateTransform attributeName="transform" type="translate" values="220,220; 220,-20" dur="6s" begin="1.4s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="6s" begin="1.4s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(640,230) scale(0.9)">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      <animateTransform attributeName="transform" type="translate" values="640,230; 640,-10" dur="8s" begin="0.6s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="8s" begin="0.6s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(820,215) scale(1)">
      <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
      <animateTransform attributeName="transform" type="translate" values="820,215; 820,-25" dur="6.5s" begin="2.1s" repeatCount="indefinite" additive="sum"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" dur="6.5s" begin="2.1s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- little candle accent on the left of the title -->
  <g transform="translate(150,108)">
    <rect x="-5" y="0" width="10" height="26" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="-5" y="0" width="10" height="26" rx="2" fill="#ff6fae" opacity="0.35"/>
    <ellipse cx="0" cy="-8" rx="5" ry="8" fill="url(#flame)">
      <animate attributeName="rx" values="5;4.3;5.4;5" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="8;7;9;8" dur="0.9s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="0;0.6;-0.5;0" dur="0.9s" repeatCount="indefinite"/>
    </ellipse>
  </g>

  <!-- title text -->
  <text x="460" y="100" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="38" font-weight="bold" fill="#ffffff">
    Happy Birthday, Beautiful!
    <animate attributeName="opacity" values="0;1" dur="1.6s" fill="freeze"/>
  </text>
  <text x="460" y="140" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="19" fill="#fff0f6">
    a little surprise, made just for you
    <animate attributeName="opacity" values="0;1" dur="1.6s" begin="0.4s" fill="freeze"/>
  </text>

  <!-- little candle accent on the right of the title -->
  <g transform="translate(770,108)">
    <rect x="-5" y="0" width="10" height="26" rx="2" fill="#ffffff" opacity="0.9"/>
    <rect x="-5" y="0" width="10" height="26" rx="2" fill="#ff6fae" opacity="0.35"/>
    <ellipse cx="0" cy="-8" rx="5" ry="8" fill="url(#flame)">
      <animate attributeName="rx" values="5;5.6;4.4;5" dur="1.05s" repeatCount="indefinite"/>
      <animate attributeName="ry" values="8;9;7;8" dur="1.05s" repeatCount="indefinite"/>
      <animate attributeName="cx" values="0;-0.6;0.5;0" dur="1.05s" repeatCount="indefinite"/>
    </ellipse>
  </g>
</svg>
